name: Build Model

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download Adult dataset
        run: |
          mkdir -p data/raw
          curl -L --fail -o data/raw/adult.data https://archive.ics.uci.edu/ml/machine-learning-databases/adult/adult.data
          curl -L --fail -o data/raw/adult.test https://archive.ics.uci.edu/ml/machine-learning-databases/adult/adult.test

      - name: Train and save model
        env:
          RUN_ID: ${{ github.run_id }}
          MODEL_VERSION: model-${{ github.run_number }}
        run: |
          python src/main.py

      - name: Run model tests
        run: |
          pytest model_tests -v

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-model-${{ github.run_number }}
          path: |
            models/model.pkl
            models/scaler.pkl
            models/encoders.pkl
            training.log
          if-no-files-found: error

      - name: Register model in GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: model-${{ github.run_number }}
          name: Model ${{ github.run_number }}
          body: |
            Modelo entrenado automáticamente desde GitHub Actions.

            Run ID: ${{ github.run_id }}
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
          files: |
            models/model.pkl
            models/scaler.pkl
            models/encoders.pkl
            training.log
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}